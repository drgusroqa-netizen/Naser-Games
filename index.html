<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naser Games | متجر الألعاب السحابي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap');

        :root {
            --primary: #000000;
            --secondary: #ffffff;
        }

        body {
            background-color: var(--secondary);
            color: var(--primary);
            font-family: 'Tajawal', sans-serif;
            scroll-behavior: smooth;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .game-card {
            background: #fff;
            border: 1px solid #eee;
            transition: all 0.4s ease;
            overflow: hidden;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #000;
        }

        .input-style {
            border: 1px solid #ddd;
            transition: border-color 0.3s ease;
        }

        .input-style:focus {
            border-color: #000;
            outline: none;
        }

        .btn-primary {
            background: #000;
            color: #fff;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #333;
        }

        .loading-spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-left-color: #000;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="glass-header fixed top-0 w-full z-40 px-6 py-4 flex justify-between items-center">
        <h1 class="text-3xl font-black tracking-tighter uppercase italic">Naser Games</h1>
        
        <div class="flex items-center gap-4">
            <button onclick="showAbout()" class="w-10 h-10 rounded-full border border-black flex items-center justify-center font-bold hover:bg-black hover:text-white transition">
                ؟
            </button>
            
            <div onclick="openLogin()" class="cursor-pointer transition hover:scale-110">
                <svg class="w-10 h-10 bg-black text-white p-2 rounded-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
        </div>
    </nav>

    <!-- Admin Floating Button -->
    <button id="adminAddBtn" onclick="openAddGame()" class="hidden fixed bottom-10 right-10 w-16 h-16 rounded-full bg-black text-white text-3xl font-bold shadow-2xl z-50 hover:scale-110 active:scale-95 transition-all flex items-center justify-center">
        +
    </button>

    <!-- Hero Section -->
    <header class="pt-32 pb-16 px-6 text-center">
        <div class="max-w-3xl mx-auto">
            <h2 class="text-5xl md:text-6xl font-black mb-4">ألعابك المفضلة في مكان واحد</h2>
            <p class="text-gray-500 text-xl font-light">مكتبة ألعاب ناصر المتجددة لحظياً</p>
            <div id="syncStatus" class="mt-4 text-xs font-bold text-green-600 flex items-center justify-center gap-2">
                <span class="w-2 h-2 bg-green-600 rounded-full animate-pulse"></span>
                متصل ومزامن لحظياً
            </div>
        </div>
    </header>

    <!-- Games Grid -->
    <main class="max-w-7xl mx-auto px-6 pb-24 text-center">
        <div id="loader" class="flex justify-center py-10"><div class="loading-spinner"></div></div>
        <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="bg-white p-10 rounded-2xl w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center">دخول المدير</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="البريد الإلكتروني" class="input-style w-full p-4 rounded-xl">
                <input type="password" id="password" placeholder="كلمة السر" class="input-style w-full p-4 rounded-xl">
                <button onclick="handleLogin()" class="btn-primary w-full py-4 rounded-xl font-bold">دخول</button>
            </div>
            <button onclick="closeModals()" class="w-full mt-6 text-gray-400 hover:text-black">إلغاء</button>
        </div>
    </div>

    <!-- Add Game Modal -->
    <div id="addGameModal" class="modal">
        <div class="bg-white p-10 rounded-2xl w-full max-w-lg shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center">إضافة لعبة جديدة</h2>
            <div class="space-y-4">
                <input type="text" id="gameName" placeholder="اسم اللعبة" class="input-style w-full p-3 rounded-lg">
                <input type="text" id="gameUrl" placeholder="رابط اللعبة" class="input-style w-full p-3 rounded-lg text-left" dir="ltr">
                <div class="border-2 border-dashed border-gray-200 rounded-lg p-4 text-center relative">
                    <input type="file" id="gameImage" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div id="uploadLabel" class="text-gray-400">اضغط لرفع صورة اللعبة</div>
                </div>
                <button id="saveBtn" onclick="saveGame()" class="btn-primary w-full py-4 rounded-xl font-bold">نشر اللعبة للجميع</button>
                <button onclick="closeModals()" class="w-full mt-2 text-gray-400 underline">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- About Modal -->
    <div id="aboutModal" class="modal">
        <div class="bg-white p-12 rounded-3xl w-full max-w-xl shadow-2xl text-center">
            <h2 class="text-4xl font-black mb-6 italic uppercase">Naser Games</h2>
            <div class="space-y-4 text-xl">
                <div class="bg-gray-50 p-4 rounded-2xl">
                    <p class="text-gray-400 text-sm mb-1">المصمم</p>
                    <p class="font-bold">عبد الناصر محمد معتصم الشمير</p>
                </div>
                <div class="bg-gray-50 p-4 rounded-2xl">
                    <p class="text-gray-400 text-sm mb-1">الجنسية</p>
                    <p class="font-bold">سوري الجنسية</p>
                </div>
            </div>
            <button onclick="closeModals()" class="mt-10 btn-primary px-12 py-3 rounded-full">إغلاق</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'naser-games-app';

        let currentUser = null;

        // 1. Authentication
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                setupRealtimeSync();
            }
        });

        initAuth();

        // 2. Real-time Sync (The most important part)
        function setupRealtimeSync() {
            const gamesRef = collection(db, 'artifacts', appId, 'public', 'data', 'games');
            
            // Listen for changes
            onSnapshot(gamesRef, (snapshot) => {
                const games = [];
                snapshot.forEach((doc) => {
                    games.push({ id: doc.id, ...doc.data() });
                });
                // Sort by time in memory (Rule 2: avoid complex queries)
                games.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderGames(games);
                document.getElementById('loader').style.display = 'none';
            }, (error) => {
                console.error("Firestore error", error);
            });
        }

        // 3. Functions accessible to HTML
        window.handleLogin = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (email === 'abdulnaser2507@icloud.com' && pass === 'Naser2507@') {
                document.getElementById('adminAddBtn').classList.remove('hidden');
                closeModals();
                alert('مرحباً ناصر، يمكنك الآن الإضافة للجميع.');
            } else {
                alert('خطأ في البيانات.');
            }
        };

        window.saveGame = async () => {
            if (!currentUser) return;
            
            const name = document.getElementById('gameName').value;
            const url = document.getElementById('gameUrl').value;
            const imgInput = document.getElementById('gameImage');

            if (!name || !url || !imgInput.files[0]) {
                alert('أكمل البيانات أولاً');
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = 'جاري النشر...';

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'games'), {
                        name: name,
                        url: url,
                        image: e.target.result,
                        createdAt: serverTimestamp()
                    });
                    closeModals();
                    document.getElementById('gameName').value = '';
                    document.getElementById('gameUrl').value = '';
                } catch (err) {
                    alert('خطأ أثناء الحفظ');
                } finally {
                    btn.disabled = false;
                    btn.innerText = 'نشر اللعبة للجميع';
                }
            };
            reader.readAsDataURL(imgInput.files[0]);
        };

        function renderGames(gamesList) {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            if (gamesList.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 opacity-30">لا توجد ألعاب مضافة بعد</div>`;
                return;
            }

            gamesList.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card rounded-2xl flex flex-col group';
                card.innerHTML = `
                    <div class="relative h-56 bg-gray-100 overflow-hidden">
                        <img src="${game.image}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" alt="${game.name}">
                    </div>
                    <div class="p-5">
                        <h3 class="text-lg font-bold mb-4 line-clamp-1">${game.name}</h3>
                        <a href="${game.url}" target="_blank" class="block w-full text-center py-3 bg-black text-white rounded-xl font-bold hover:bg-gray-800 transition">العب الآن</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Global functions for UI
        window.openLogin = () => document.getElementById('loginModal').style.display = 'flex';
        window.showAbout = () => document.getElementById('aboutModal').style.display = 'flex';
        window.openAddGame = () => document.getElementById('addGameModal').style.display = 'flex';
        window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        
        document.getElementById('gameImage').addEventListener('change', function() {
            if(this.files[0]) document.getElementById('uploadLabel').innerText = this.files[0].name;
        });
    </script>
</body>
</html>
